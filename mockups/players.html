<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players | WC26 Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .search-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-8);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            background: var(--color-surface);
            border: 1px solid var(--color-hairline);
            border-radius: var(--space-2);
            padding: var(--space-3) var(--space-4);
            padding-left: 40px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--color-ink);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .action-btns {
            display: flex;
            gap: var(--space-2);
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--space-2);
            border: 1px solid var(--color-hairline);
            background: #fff;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: var(--color-ink);
            color: var(--color-ink);
        }

        .player-table-card {
            background: #fff;
            border: 1px solid var(--color-hairline);
            border-radius: var(--space-3);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            padding: var(--space-4) var(--space-6);
            border-bottom: 1px solid var(--color-hairline);
            background: var(--color-surface);
        }

        td {
            padding: var(--space-4) var(--space-6);
            border-bottom: 1px solid var(--color-hairline);
            font-size: 14px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .player-name {
            font-weight: 600;
            text-decoration: none;
            color: var(--color-ink);
            transition: text-decoration 0.2s;
        }

        .player-name:hover {
            text-decoration: underline;
        }

        .avatar-sm {
            width: 32px;
            height: 32px;
            background: #eee;
            border-radius: 50%;
        }

        .nat-cell {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .flag-icon {
            width: 20px;
            height: 14px;
            background: #ddd;
            border-radius: 2px;
        }

        .rating-badge {
            font-family: var(--font-mono);
            font-weight: 600;
            background: var(--color-ink);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="layout-with-sidebar">
    <aside class="sidebar">
        <div style="font-family: var(--font-display); font-weight: 600; font-size: 18px; margin-bottom: var(--space-12);">⚽</div>
        <button class="nav-icon-btn" title="Live Overview" onclick="window.location.href='live-overview.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </button>
        <button class="nav-icon-btn active" title="Players">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </button>
        <button class="nav-icon-btn" title="Teams">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
        </button>
        <button class="nav-icon-btn" title="Settings" style="margin-top: auto;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: var(--space-8);">
            <h1 style="font-size: 32px;">Players</h1>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="text" class="search-input" placeholder="Search for players...">
            </div>
            <div class="action-btns">
                <button class="icon-btn" title="Sort">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                </button>
                <button class="icon-btn" title="Filter">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                </button>
            </div>
        </div>

        <div class="player-table-card">
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Nationality</th>
                        <th>Club</th>
                        <th>Position</th>
                        <th>Rating</th>
                    </tr>
                </thead>
                <tbody id="player-body">
                    <!-- Rows dynamic -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<script>
    const players = [
        { name: 'Lionel Messi', code: 'ARG', country: 'Argentina', club: 'Inter Miami', pos: 'FW', rate: '9.4' },
        { name: 'Kylian Mbappé', code: 'FRA', country: 'France', club: 'Real Madrid', pos: 'FW', rate: '9.2' },
        { name: 'Kevin De Bruyne', code: 'BEL', country: 'Belgium', club: 'Man City', pos: 'MF', rate: '8.9' },
        { name: 'Jude Bellingham', code: 'ENG', country: 'England', club: 'Real Madrid', pos: 'MF', rate: '8.8' },
        { name: 'Vinícius Júnior', code: 'BRA', country: 'Brazil', club: 'Real Madrid', pos: 'FW', rate: '8.7' },
        { name: 'Antoine Griezmann', code: 'FRA', country: 'France', club: 'Atlético', pos: 'MF', rate: '8.5' },
        { name: 'Pedri', code: 'ESP', country: 'Spain', club: 'Barcelona', pos: 'MF', rate: '8.4' }
    ];

    const body = document.getElementById('player-body');
    players.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <div class="player-info">
                    <div class="avatar-sm"></div>
                    <a href="player-details.html" class="player-name">${p.name}</a>
                </div>
            </td>
            <td>
                <div class="nat-cell">
                    <div class="flag-icon"></div>
                    <span>${p.country}</span>
                </div>
            </td>
            <td style="opacity: 0.6;">${p.club}</td>
            <td class="mono" style="font-size: 12px; opacity: 0.8;">${p.pos}</td>
            <td><span class="rating-badge">${p.rate}</span></td>
        `;
        body.appendChild(tr);
    });

    gsap.from("tr", { opacity: 0, y: 15, stagger: 0.05, duration: 0.6, ease: "power2.out" });
</script>

</body>
</html>
