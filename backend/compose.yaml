services:
  db:
    image: postgres:latest
    container_name: world_cup_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  airflow-db-bootstrap:
    image: postgres:latest
    container_name: airflow_db_bootstrap
    restart: "no"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - AIRFLOW_POSTGRES_DB=${AIRFLOW_POSTGRES_DB:-airflow_db}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        until pg_isready -h "$${POSTGRES_HOST}" -p "$${POSTGRES_PORT}" -U "$${POSTGRES_USER}" -d postgres; do
          sleep 2
        done
        if ! PGPASSWORD="$${POSTGRES_PASSWORD}" psql -h "$${POSTGRES_HOST}" -p "$${POSTGRES_PORT}" -U "$${POSTGRES_USER}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$${AIRFLOW_POSTGRES_DB}'" | grep -q 1; then
          PGPASSWORD="$${POSTGRES_PASSWORD}" createdb -h "$${POSTGRES_HOST}" -p "$${POSTGRES_PORT}" -U "$${POSTGRES_USER}" "$${AIRFLOW_POSTGRES_DB}"
        fi
        echo "Airflow database ready: $${AIRFLOW_POSTGRES_DB}"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    container_name: world_cup_api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:local
    container_name: airflow_webserver
    command: webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - WC2026_API_KEY=${WC2026_API_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
      - ./services:/opt/airflow/backend/services
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:local
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - WC2026_API_KEY=${WC2026_API_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
      - ./services:/opt/airflow/backend/services
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:local
    container_name: airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
    depends_on:
      airflow-db-bootstrap:
        condition: service_completed_successfully
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --firstname Fortune \
          --lastname Alebiosu \
          --role Admin \
          --email fortunealebiosu710@gmail.com \
          --password ${AIRFLOW_ADMIN_PASSWORD} || true

  rabbitmq:
    image: rabbitmq:3-management
    container_name: world_cup_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-beat:
    build: .
    container_name: world_cup_celery_beat
    command: celery -A services.celery_app beat --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery-worker-fetch:
    build: .
    container_name: world_cup_celery_worker_fetch
    command: celery -A services.celery_app worker --loglevel=info -Q worker_fetch --concurrency=2
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery-worker-db:
    build: .
    container_name: world_cup_celery_worker_db
    command: celery -A services.celery_app worker --loglevel=info -Q worker_db --concurrency=4
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: world_cup_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: world_cup_grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
