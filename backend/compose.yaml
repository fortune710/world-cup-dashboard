services:
  db:
    image: postgres:latest
    container_name: world_cup_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  web:
    build: .
    container_name: world_cup_api
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-apache/airflow:latest-python3.11}
    container_name: airflow_webserver
    command: webserver
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - _PIP_ADDITIONAL_REQUIREMENTS=requests sqlalchemy psycopg2-binary
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-apache/airflow:latest-python3.11}
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - _PIP_ADDITIONAL_REQUIREMENTS=requests sqlalchemy psycopg2-binary
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
    depends_on:
      db:
        condition: service_healthy

  airflow-init:
    image: ${AIRFLOW_IMAGE:-apache/airflow:latest-python3.11}
    container_name: airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --firstname Fortune \
          --lastname Alebiosu \
          --role Admin \
          --email fortunealebiosu710@gmail.com \
          --password ${AIRFLOW_ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
