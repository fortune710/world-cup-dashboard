services:
  web:
    build: .
    image: world_cup_api:prod
    container_name: world_cup_api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    expose:
      - "8000"

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow.webserver
    image: world-cup-airflow:webserver-prod
    container_name: airflow_webserver
    command: webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - WC2026_API_KEY=${WC2026_API_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX=/airflow
      - AIRFLOW__WEBSERVER__BASE_URL=https://${DROPLET_HOST}/airflow
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
      - AIRFLOW__WEBSERVER__UPDATE_FAB_PERMS=False
      - AIRFLOW__FAB__UPDATE_FAB_PERMS=False
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=900
      - AIRFLOW__WEBSERVER__WORKERS=1
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
      - ./services:/opt/airflow/backend/services
      - airflow_logs:/opt/airflow/logs
    expose:
      - "8080"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:prod
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - WC2026_API_KEY=${WC2026_API_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX=/airflow
      - AIRFLOW__WEBSERVER__BASE_URL=https://${DROPLET_HOST}/airflow
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
      - ./services:/opt/airflow/backend/services
      - airflow_logs:/opt/airflow/logs

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:prod
    container_name: airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
      - DATABASE_URL=${DATABASE_URL}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --firstname Fortune \
          --lastname Alebiosu \
          --role Admin \
          --email fortunealebiosu710@gmail.com \
          --password ${AIRFLOW_ADMIN_PASSWORD} || true

  rabbitmq:
    image: rabbitmq:3-management
    container_name: world_cup_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-beat:
    build: .
    image: world_cup_backend:prod
    container_name: world_cup_celery_beat
    command: celery -A services.celery_app beat --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app/backend
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery-worker-fetch:
    build: .
    image: world_cup_backend:prod
    container_name: world_cup_celery_worker_fetch
    command: celery -A services.celery_app worker --loglevel=info -Q worker_fetch --concurrency=2
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app/backend
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery-worker-matchday-stats:
    build: .
    image: world_cup_backend:prod
    container_name: world_cup_celery_worker_matchday_stats
    command: celery -A services.celery_app worker --loglevel=info -Q worker_matchday_stats --concurrency=2
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app/backend
      - PROXY_SERVER=${PROXY_SERVER}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: world_cup_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: world_cup_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_DOMAIN=${DROPLET_HOST}
      - GF_SERVER_ROOT_URL=https://${DROPLET_HOST}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: always

  loki:
    image: grafana/loki:3.3.2
    container_name: world_cup_loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    restart: always

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: world_cup_alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: world_cup_nginx
    restart: always
    depends_on:
      - web
      - grafana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  prometheus_data:
  grafana_data:
  airflow_logs:
  loki_data:
  alloy_data:
