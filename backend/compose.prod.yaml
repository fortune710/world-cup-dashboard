services:
  web:
    build: .
    image: world_cup_api:prod
    container_name: world_cup_api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    expose:
      - "8000"

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:prod
    container_name: airflow_webserver
    command: webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - WC2026_API_KEY=${WC2026_API_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX=/airflow
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
      - RABBITMQ_URL=${RABBITMQ_URL}
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
      - ./services:/opt/airflow/backend/services
    expose:
      - "8080"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:prod
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW_LOAD_EXAMPLES:-False}
      - PYTHONPATH=/opt/airflow/backend
      - WC2026_API_KEY=${WC2026_API_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX=/airflow
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
      - RABBITMQ_URL=${RABBITMQ_URL}
    volumes:
      - ./pipeline/orchestration:/opt/airflow/dags
      - ./pipeline:/opt/airflow/backend/pipeline
      - ./db:/opt/airflow/backend/db
      - ./config:/opt/airflow/backend/config
      - ./services:/opt/airflow/backend/services

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: world-cup-airflow:prod
    container_name: airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DATABASE_URL}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --firstname Fortune \
          --lastname Alebiosu \
          --role Admin \
          --email fortunealebiosu710@gmail.com \
          --password ${AIRFLOW_ADMIN_PASSWORD} || true

  rabbitmq:
    image: rabbitmq:3-management
    container_name: world_cup_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-beat:
    build: .
    image: world_cup_backend:prod
    container_name: world_cup_celery_beat
    command: celery -A services.celery_app beat --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app/backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery-worker-fetch:
    build: .
    image: world_cup_backend:prod
    container_name: world_cup_celery_worker_fetch
    command: celery -A services.celery_app worker --loglevel=info -Q worker_fetch --concurrency=2
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app/backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery-worker-db:
    build: .
    image: world_cup_backend:prod
    container_name: world_cup_celery_worker_db
    command: celery -A services.celery_app worker --loglevel=info -Q worker_db --concurrency=4
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - WC2026_API_KEY=${WC2026_API_KEY}
      - PYTHONPATH=/app/backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: world_cup_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: world_cup_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: world_cup_nginx
    restart: always
    depends_on:
      - web
      - airflow-webserver
      - grafana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro

volumes:
  prometheus_data:
  grafana_data:
