map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name wcapi.fortunealebiosu.tech;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name wcapi.fortunealebiosu.tech;

  resolver 127.0.0.11 valid=10s ipv6=off;

  ssl_certificate /etc/letsencrypt/live/wcapi.fortunealebiosu.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wcapi.fortunealebiosu.tech/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 20m;

  set $api_host web;
  set $airflow_host airflow-webserver;
  set $grafana_host grafana;

  location = /airflow {
    return 301 /airflow/;
  }

  location /airflow/ {
    proxy_pass http://$airflow_host:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
  }

  location = /grafana {
    return 301 /grafana/;
  }

  location /grafana/ {
    proxy_pass http://$grafana_host:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
  }

  location / {
    proxy_pass http://$api_host:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
  }
}
