name: Backend Deployment

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: backend-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy backend to DigitalOcean droplet
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Configure SSH key
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DROPLET_SSH_KEY" > ~/.ssh/droplet_key
          chmod 600 ~/.ssh/droplet_key

      - name: Trust droplet host key
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh-keyscan -p "$DROPLET_PORT" -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - name: Write backend env file
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AIRFLOW_DATABASE_URL: ${{ secrets.AIRFLOW_DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          AIRFLOW_POSTGRES_DB: ${{ secrets.AIRFLOW_POSTGRES_DB }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW_WEBSERVER_SECRET_KEY: ${{ secrets.AIRFLOW_WEBSERVER_SECRET_KEY }}
          WC2026_API_KEY: ${{ secrets.WC2026_API_KEY }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          PROMETHEUS_PORT: ${{ secrets.PROMETHEUS_PORT }}
          GRAFANA_PORT: ${{ secrets.GRAFANA_PORT }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          env_file="$(mktemp)"
          {
            printf '%s=%s\n' DATABASE_URL "$DATABASE_URL"
            printf '%s=%s\n' AIRFLOW_DATABASE_URL "$AIRFLOW_DATABASE_URL"
            printf '%s=%s\n' POSTGRES_USER "$POSTGRES_USER"
            printf '%s=%s\n' POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
            printf '%s=%s\n' POSTGRES_DB "$POSTGRES_DB"
            printf '%s=%s\n' AIRFLOW_POSTGRES_DB "$AIRFLOW_POSTGRES_DB"
            printf '%s=%s\n' AIRFLOW_ADMIN_USER "$AIRFLOW_ADMIN_USER"
            printf '%s=%s\n' AIRFLOW_ADMIN_PASSWORD "$AIRFLOW_ADMIN_PASSWORD"
            printf '%s=%s\n' AIRFLOW_WEBSERVER_SECRET_KEY "$AIRFLOW_WEBSERVER_SECRET_KEY"
            printf '%s=%s\n' WC2026_API_KEY "$WC2026_API_KEY"
            printf '%s=%s\n' RABBITMQ_USER "$RABBITMQ_USER"
            printf '%s=%s\n' RABBITMQ_PASSWORD "$RABBITMQ_PASSWORD"
            printf '%s=%s\n' RABBITMQ_URL "$RABBITMQ_URL"
            printf '%s=%s\n' PROMETHEUS_PORT "$PROMETHEUS_PORT"
            printf '%s=%s\n' GRAFANA_PORT "$GRAFANA_PORT"
            printf '%s=%s\n' GRAFANA_ADMIN_USER "$GRAFANA_ADMIN_USER"
            printf '%s=%s\n' GRAFANA_ADMIN_PASSWORD "$GRAFANA_ADMIN_PASSWORD"
          } > "$env_file"

          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'mkdir -p ~/world-cup-dashboard/backend'
          scp -i ~/.ssh/droplet_key -P "$DROPLET_PORT" "$env_file" "deployment-admin@$DROPLET_HOST:~/world-cup-dashboard/backend/.env"
          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'chmod 600 ~/world-cup-dashboard/backend/.env'
          rm -f "$env_file"

      - name: Detect backend model changes
        id: detect_backend_model_changes
        uses: actions/github-script@v7
        with:
          script: |
            const shouldMigrate = context.eventName === 'pull_request'
              ? (await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  per_page: 100,
                })).some((file) => file.filename.startsWith('backend/db/models/'))
              : false;

            core.info(`backend/db/models changed: ${shouldMigrate}`);
            core.setOutput('should_migrate', shouldMigrate ? 'true' : 'false');

      - name: Sync backend checkout on droplet
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'bash -s' <<'EOF'
          set -Eeuo pipefail

          DEPLOY_DIR="$HOME/world-cup-dashboard"

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "Expected the repository to be checked out at $DEPLOY_DIR"
            exit 1
          fi

          cd "$DEPLOY_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          EOF

      - name: Run backend migrations
        if: steps.detect_backend_model_changes.outputs.should_migrate == 'true'
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'bash -s' <<'EOF'
          set -Eeuo pipefail

          DEPLOY_DIR="$HOME/world-cup-dashboard"

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "Expected the repository to be checked out at $DEPLOY_DIR"
            exit 1
          fi

          cd "$DEPLOY_DIR/backend"
          docker compose -f compose.prod.yaml run --rm --build --no-deps web bash scripts/migrate.sh
          EOF

      - name: Deploy and start backend
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'bash -s' <<'EOF'
          set -Eeuo pipefail

          DEPLOY_DIR="$HOME/world-cup-dashboard"

          compose_logs() {
            cd "$DEPLOY_DIR/backend" >/dev/null 2>&1 || return 0

            if docker compose version >/dev/null 2>&1; then
              docker compose -f compose.prod.yaml ps || true
              echo
              docker compose -f compose.prod.yaml logs --no-color --tail=200 || true
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose -f compose.prod.yaml ps || true
              echo
              docker-compose -f compose.prod.yaml logs --no-color --tail=200 || true
            else
              echo "No compose command available for log collection."
            fi
          }

          on_error() {
            echo "=== Deployment failed, collecting compose logs ==="
            compose_logs
          }

          trap on_error ERR

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "Expected the repository to be checked out at $DEPLOY_DIR"
            exit 1
          fi

          cd backend
          bash scripts/startup-prod.sh
          EOF

      - name: Collect server logs on failure
        if: failure()
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'bash -s' <<'EOF'
          set +e

          DEPLOY_DIR="$HOME/world-cup-dashboard"

          echo "=== Docker version ==="
          docker --version
          echo

          echo "=== Docker ps ==="
          docker ps -a
          echo

          echo "=== Compose service status ==="
          cd "$DEPLOY_DIR/backend" || exit 0

          if docker compose version >/dev/null 2>&1; then
            docker compose -f compose.prod.yaml ps
            echo
            echo "=== Compose logs ==="
            docker compose -f compose.prod.yaml logs --no-color --tail=200
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose -f compose.prod.yaml ps
            echo
            echo "=== Compose logs ==="
            docker-compose -f compose.prod.yaml logs --no-color --tail=200
          else
            echo "No compose command available for diagnostics."
          fi
          EOF
