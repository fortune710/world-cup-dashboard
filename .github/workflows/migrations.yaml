name: Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - "backend/db/models/**"
      - "backend/alembic/**"
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "backend/db/models/**"
      - "backend/alembic/**"

permissions:
  contents: read

concurrency:
  group: backend-production-migrations
  cancel-in-progress: true

jobs:
  migrate_database:
    name: Run database migrations
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Configure SSH key
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DROPLET_SSH_KEY" > ~/.ssh/droplet_key
          chmod 600 ~/.ssh/droplet_key

      - name: Trust droplet host key
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh-keyscan -p "$DROPLET_PORT" -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - name: Sync backend checkout on droplet
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'bash -s' <<'EOF'
          set -Eeuo pipefail

          DEPLOY_DIR="$HOME/world-cup-dashboard"

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "Expected the repository to be checked out at $DEPLOY_DIR"
            exit 1
          fi

          cd "$DEPLOY_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          EOF

      - name: Run backend migrations
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || 22 }}
        run: |
          ssh -i ~/.ssh/droplet_key -p "$DROPLET_PORT" "deployment-admin@$DROPLET_HOST" 'bash -s' <<'EOF'
          set -Eeuo pipefail

          DEPLOY_DIR="$HOME/world-cup-dashboard"

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "Expected the repository to be checked out at $DEPLOY_DIR"
            exit 1
          fi

          cd "$DEPLOY_DIR/backend"
          docker compose -f compose.prod.yaml run --rm --build --no-deps web bash scripts/migrate.sh
          EOF
